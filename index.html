<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#f0ebe0">
  <title>BOXPUSH</title>
  <link rel="stylesheet" href="style.css">
  <!-- Google AdSense -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3452887894702338" crossorigin="anonymous"></script>
</head>
<body>

<!-- TITLE -->
<div id="screen-title" class="screen active">
  <div class="title-logo">BOXPUSH</div>
  <div class="title-sub">PUSH · SOLVE · REPEAT</div>
  <canvas id="title-canvas" class="title-preview-wrap"></canvas>
  <br>
  <div id="continue-btn-wrap" style="display:none">
    <button class="btn-primary" onclick="continueGame()" id="continue-btn">▶ CONTINUE</button>
    <div style="font-size:7px;color:var(--dim);letter-spacing:2px;text-align:center;margin-top:-2px;margin-bottom:4px" id="continue-label"></div>
  </div>
  <button class="btn-secondary" onclick="startGame()" id="new-game-btn">▶ NEW GAME</button>
  <button class="btn-secondary" onclick="showHowTo()">? HOW TO PLAY</button>
  <div class="info-tag">INFINITE LEVELS · WORKS OFFLINE · SWIPE TO MOVE</div>
</div>

<!-- GAME -->
<div id="screen-game" class="screen">
  <div class="game-header">
    <button class="header-btn" onclick="showScreen('title')">◀ MENU</button>
    <div class="game-level-label" id="level-label">LEVEL 1</div>
    <div class="game-moves">MOVES <span id="move-count">0</span></div>
    <button class="header-btn" onclick="undoMove()">↩ UNDO</button>
    <button class="header-btn" onclick="resetLevel()">↺ RESET</button>
  </div>
  <div class="game-area" id="game-area">
    <canvas id="game-canvas"></canvas>
  </div>
  <div class="game-footer">
    <div class="boxes-label">📦 <span id="boxes-label">0/0</span></div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
    </div>
  </div>
</div>

<!-- WIN -->
<div id="win-overlay">
  <div class="win-title">✦ SOLVED! ✦</div>
  <div class="win-sub" id="win-sub-text">LEVEL 1</div>
  <div class="win-moves" id="win-moves-text">Completed in <b>0</b> moves</div>
  <div class="win-btns">
    <button class="btn-primary" onclick="generateAndPlay()">NEXT LEVEL ▶</button>
    <button class="btn-secondary" onclick="replayLevel()">↺ REPLAY</button>
  </div>
</div>

<!-- GENERATING -->
<div id="gen-overlay">
  <div class="gen-spinner"></div>
  <div class="gen-text">GENERATING LEVEL</div>
  <div class="gen-status" id="gen-status">BUILDING PUZZLE...</div>
</div>

<script src="render.js"></script>
<script src="game.js"></script>
</body>
</html>
